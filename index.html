<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Trainer Robert // Level 32</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg1:#07111f;
  --bg2:#13243f;
  --line:#334155;
  --text:#e5e7eb;
  --muted:#cbd5e1;
  --yellow:#facc15;
  --blue:#38bdf8;
  --green:#22c55e;
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:Montserrat,system-ui;
  color:var(--text);
  background:linear-gradient(135deg, var(--bg1), var(--bg2));
}

.wrap{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
}

.screen{
  width:min(1000px,100%);
  background:#101827;
  border:4px solid var(--yellow);
  border-radius:24px;
  padding:22px;
}

h1{
  text-align:center;
  font-family:"Press Start 2P";
  color:var(--yellow);
}

.section{
  background:#172033;
  border-left:6px solid var(--yellow);
  border-radius:18px;
  padding:18px;
  margin:16px 0;
}

.thunderStage{
  position:relative;
  height:120px;
  border-radius:18px;
  border:2px solid var(--blue);
  background:#0f172a;
  overflow:hidden;
  margin-bottom:16px;
}

.stormCloud{
  position:absolute;
  left:20px;
  top:50%;
  transform:translateY(-50%);
  font-size:42px;
}

.speakerOrb{
  position:absolute;
  right:20px;
  top:50%;
  transform:translateY(-50%);
  width:64px;
  height:64px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#22c55e;
  font-size:28px;
  font-weight:900;
}

.lightningBolt{
  position:absolute;
  left:72px;
  top:50%;
  transform:translateY(-50%) scale(.75);
  font-size:44px;
  opacity:0;
}

.lightningBolt.fire{
  animation:boltShoot 900ms ease forwards;
}

@keyframes boltShoot{
  0%{ left:72px; opacity:0; }
  15%{ opacity:1; }
  100%{ left:calc(100% - 108px); opacity:1; }
}

.thunderBtn{
  padding:14px 20px;
  border-radius:12px;
  border:none;
  background:linear-gradient(180deg, #facc15, #f59e0b);
  font-weight:800;
  font-family:"Press Start 2P";
  cursor:pointer;
}

.videoWrap{
  max-height:0;
  overflow:hidden;
  opacity:0;
  transition:all .5s ease;
}

.videoWrap.show{
  max-height:400px;
  opacity:1;
  margin-top:15px;
}

.screenBolt{
  position:fixed;
  top:-20px;
  font-size:34px;
  pointer-events:none;
  animation:screenBolt 1.2s ease-out forwards;
}

@keyframes screenBolt{
  0%{opacity:0; transform:translateY(0);}
  10%{opacity:1;}
  100%{opacity:0; transform:translateY(220px);}
}
</style>
</head>

<body>

<div class="wrap">
<main class="screen">

<h1>LEVEL 32 UNLOCKED</h1>

<section class="section thunderSection">
  <h2>⚡ Thunderclap Activation</h2>
  <p>Push for thunderclap to reveal the birthday theme ⚡</p>

  <div class="thunderStage">
    <div class="stormCloud">☁️</div>
    <div class="lightningBolt" id="lightningBolt">⚡</div>
    <div class="speakerOrb">♫</div>
  </div>

  <button id="thunderBtn" class="thunderBtn">PUSH FOR THUNDERCLAP</button>

  <div class="videoWrap" id="videoSection">
    <iframe id="ytPlayer"
      width="100%"
      height="315"
      src=""
      title="YouTube video player"
      frameborder="0"
      allow="autoplay; encrypted-media; picture-in-picture"
      allowfullscreen>
    </iframe>
  </div>
</section>

</main>
</div>

<script>
const thunderBtn = document.getElementById("thunderBtn");
const lightningBolt = document.getElementById("lightningBolt");
const videoSection = document.getElementById("videoSection");
const ytPlayer = document.getElementById("ytPlayer");

function launchLightningBursts(){
  for(let i = 0; i < 15; i++){
    const el = document.createElement("div");
    el.className = "screenBolt";
    el.textContent = "⚡";
    el.style.left = Math.random() * window.innerWidth + "px";
    el.style.animationDelay = (Math.random() * 300) + "ms";
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1400);
  }
}

thunderBtn.addEventListener("click", () => {

  lightningBolt.classList.add("fire");

  setTimeout(() => {
    videoSection.classList.add("show");

    // AUTOPLAY VIDEO
    ytPlayer.src = "https://www.youtube.com/embed/R4GIyJxvk94?autoplay=1&mute=0";

    launchLightningBursts();
  }, 900);

});
</script>

</body>
</html>
